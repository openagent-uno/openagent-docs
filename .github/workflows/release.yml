name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  # ── openagent-framework → PyPI ──
  framework:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        run: pip install build && python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - uses: actions/upload-artifact@v4
        with:
          name: framework-dist
          path: dist/*

  # ── openagent-cli → build only (PyPI publish when project exists) ──
  cli:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build CLI
        working-directory: cli
        run: pip install build && python -m build
      - name: Publish CLI to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/
        continue-on-error: true  # first publish needs PyPI project setup
      - uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: cli/dist/*

  # ── Desktop app → GitHub Release (macOS, Windows, Linux) ──
  desktop:
    strategy:
      fail-fast: false  # don't cancel other platforms on one failure
      matrix:
        include:
          - os: macos-latest
            build_flag: --mac
          - os: windows-latest
            build_flag: --win
          - os: ubuntu-latest
            build_flag: --linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm libarchive-tools
      - name: Install universal deps
        working-directory: app/universal
        run: npm install
      - name: Build web app
        working-directory: app/universal
        run: npx expo export --platform web
      - name: Install desktop deps
        working-directory: app/desktop
        run: npm install
      - name: Copy web build and fix paths
        run: |
          rm -rf app/desktop/web-build
          cp -r app/universal/dist app/desktop/web-build
          sed -i.bak 's|href="/|href="./|g; s|src="/|src="./|g' app/desktop/web-build/index.html
          rm -f app/desktop/web-build/index.html.bak
        shell: bash
      - name: Build Electron app
        working-directory: app/desktop
        run: npx tsc && npx electron-builder ${{ matrix.build_flag }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            app/desktop/release/*.dmg
            app/desktop/release/*.zip
            app/desktop/release/*.exe
            app/desktop/release/*.AppImage
            app/desktop/release/*.deb
            app/desktop/release/*.yml
            app/desktop/release/*.yaml

  # ── GitHub Release with all artifacts ──
  release:
    needs: [framework, cli, desktop]
    if: always() && needs.framework.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: find artifacts -type f | head -40
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.whl
            artifacts/**/*.tar.gz
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.yml
            artifacts/**/*.yaml
          generate_release_notes: true
