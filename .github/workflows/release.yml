name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  # ── Desktop app → GitHub Release (macOS, Windows, Linux) ──
  desktop:
    strategy:
      fail-fast: false  # don't cancel other platforms on one failure
      matrix:
        include:
          - os: macos-latest
            build_flag: --mac
          - os: windows-latest
            build_flag: --win
          - os: ubuntu-latest
            build_flag: --linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm libarchive-tools
      - name: Install universal deps
        working-directory: app/universal
        run: npm install
      - name: Build web app
        working-directory: app/universal
        run: npx expo export --platform web
      - name: Install desktop deps
        working-directory: app/desktop
        run: npm install
      - name: Copy web build and fix paths
        run: |
          rm -rf app/desktop/web-build
          cp -r app/universal/dist app/desktop/web-build
          sed -i.bak 's|href="/|href="./|g; s|src="/|src="./|g' app/desktop/web-build/index.html
          rm -f app/desktop/web-build/index.html.bak
        shell: bash
      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [ -z "$CSC_LINK" ]; then
            echo "⚠️  CSC_LINK not set — build will be unsigned"
          fi
      - name: Build Electron app
        working-directory: app/desktop
        run: npx tsc && npx electron-builder ${{ matrix.build_flag }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ runner.os == 'macOS' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            app/desktop/release/*.dmg
            app/desktop/release/*.zip
            app/desktop/release/*.exe
            app/desktop/release/*.AppImage
            app/desktop/release/*.deb
            app/desktop/release/*.yml
            app/desktop/release/*.yaml

  # ── openagent server standalone executable (macOS, Linux, Windows) ──
  executable:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Python deps + PyInstaller
        run: pip install -e ".[all]" pyinstaller
      - name: Build Node MCPs
        shell: bash
        run: |
          for mcp_dir in openagent/mcp/servers/computer-control openagent/mcp/servers/shell openagent/mcp/servers/web-search openagent/mcp/servers/editor openagent/mcp/servers/chrome-devtools openagent/mcp/servers/messaging; do
            if [ -d "$mcp_dir" ]; then
              echo "Building $mcp_dir..."
              (cd "$mcp_dir" && npm install --silent && npm run build --silent 2>/dev/null || true)
            fi
          done
      - name: Build executable
        run: pyinstaller openagent.spec --clean --noconfirm
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        # PyInstaller onefile mode writes a single binary to ``dist/openagent``.
        # We tar just the binary (no folder wrapping) so the archive extracts to
        # one executable file — no ``_internal/`` sibling directory, nothing for
        # the user to explore. ``tar -C dist openagent`` is the idiomatic way
        # to include a single file without its parent-directory prefix.
        run: |
          VERSION=$(python -c "import openagent; print(openagent.__version__)")
          OS_NAME=$(echo "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          case "$ARCH" in x86_64) ARCH=x64;; aarch64|arm64) ARCH=arm64;; esac
          chmod +x dist/openagent
          ARCHIVE="openagent-${VERSION}-${OS_NAME}-${ARCH}.tar.gz"
          tar czf "dist/$ARCHIVE" -C dist openagent
          (cd dist && shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256")
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = python -c "import openagent; print(openagent.__version__)"
          $archive = "openagent-${version}-windows-x64.zip"
          Compress-Archive -Path dist/openagent.exe -DestinationPath "dist/$archive"
          (Get-FileHash -Algorithm SHA256 "dist/$archive").Hash + "  " + $archive | Out-File "dist/${archive}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: executable-${{ matrix.os }}
          path: |
            dist/openagent-*.tar.gz
            dist/openagent-*.zip
            dist/openagent-*.sha256

  # ── openagent-cli standalone executable (macOS, Linux, Windows) ──
  cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install CLI deps + PyInstaller
        working-directory: cli
        run: pip install -e . pyinstaller
      - name: Build CLI executable
        run: pyinstaller cli.spec --clean --noconfirm
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION=$(python -c "import openagent_cli; print(openagent_cli.__version__)")
          OS_NAME=$(echo "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          case "$ARCH" in x86_64) ARCH=x64;; aarch64|arm64) ARCH=arm64;; esac
          chmod +x dist/openagent-cli
          ARCHIVE="openagent-cli-${VERSION}-${OS_NAME}-${ARCH}.tar.gz"
          tar czf "dist/$ARCHIVE" -C dist openagent-cli
          (cd dist && shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256")
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = python -c "import openagent_cli; print(openagent_cli.__version__)"
          $archive = "openagent-cli-${version}-windows-x64.zip"
          Compress-Archive -Path dist/openagent-cli.exe -DestinationPath "dist/$archive"
          (Get-FileHash -Algorithm SHA256 "dist/$archive").Hash + "  " + $archive | Out-File "dist/${archive}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os }}
          path: |
            dist/openagent-cli-*.tar.gz
            dist/openagent-cli-*.zip
            dist/openagent-cli-*.sha256

  # ── GitHub Release with all artifacts ──
  release:
    needs: [desktop, executable, cli]
    if: always() && needs.executable.result == 'success' && needs.cli.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: find artifacts -type f | head -40
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sha256
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.yml
            artifacts/**/*.yaml
          generate_release_notes: true
