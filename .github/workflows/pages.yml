name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages.yml"
      - "docs/**"
      - "app/universal/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install docs dependencies
        run: npm ci

      - name: Build VitePress site
        run: npm run docs:build

      - name: Install app dependencies
        working-directory: app/universal
        run: npm install --no-audit --no-fund

      - name: Build Expo web app (baseUrl=/app)
        working-directory: app/universal
        env:
          EXPO_BASE_URL: /app
        run: npx expo export --platform web

      - name: Merge app into Pages artifact
        run: |
          mkdir -p docs/.vitepress/dist/app
          cp -r app/universal/dist/. docs/.vitepress/dist/app/
          # SPA fallback for deep links under /app/* on GitHub Pages
          cp docs/.vitepress/dist/app/index.html docs/.vitepress/dist/app/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
